<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAS - Sistem Rental Mobil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🚗 DriveEase - Sistem Admin Rental Mobil</span>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="row">
            <div class="col-md-5 mb-4">
                <div class="card p-4 mb-4">
                    <h4 class="card-title text-primary mb-3">Tambah / Edit Mobil</h4>
                    <form id="formMobil">
                        <input type="hidden" id="mobilId">
                        <div class="mb-3">
                            <label class="form-label">Nama Mobil</label>
                            <input type="text" id="namaMobil" class="form-control" placeholder="Contoh: Avanza Veloz" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tipe/Jenis</label>
                            <input type="text" id="tipeMobil" class="form-control" placeholder="Contoh: MPV / SUV" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Harga Sewa / Hari (Rp)</label>
                            <input type="number" id="hargaMobil" class="form-control" placeholder="Contoh: 350000" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" id="btnSimpanMobil">Simpan Mobil</button>
                    </form>
                </div>

                <div class="card p-4">
                    <h4 class="card-title text-success mb-3">Form Transaksi Booking</h4>
                    <form id="formPesanan">
                        <div class="mb-3">
                            <label class="form-label">Nama Penyewa</label>
                            <input type="text" id="namaPenyewa" class="form-control" placeholder="Nama Lengkap" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Pilih Mobil Yang Tersedia</label>
                            <select id="selectMobil" class="form-select" required>
                                <option value="">-- Pilih Mobil --</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tanggal Mulai</label>
                            <input type="date" id="tanggalMulai" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Durasi (Hari)</label>
                            <input type="number" id="durasiSewa" class="form-control" min="1" placeholder="1" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Buat Pesanan</button>
                    </form>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card p-4 mb-4">
                    <h4 class="mb-3">Daftar Armada Mobil</h4>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-light">
                                <tr>
                                    <th>Nama</th>
                                    <th>Tipe</th>
                                    <th>Harga/Hari</th>
                                    <th>Status</th>
                                    <th>Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="tabelMobil"></tbody>
                        </table>
                    </div>
                </div>

                <div class="card p-4">
                    <h4 class="mb-3">Histori & Transaksi Aktif</h4>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-light">
                                <tr>
                                    <th>Penyewa</th>
                                    <th>Mobil</th>
                                    <th>Tgl Mulai</th>
                                    <th>Durasi</th>
                                    <th>Total Bayar</th>
                                    <th>Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="tabelPesanan"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        // Load Data Pertama Kali Halaman Dibuka
        document.addEventListener('DOMContentLoaded', () => {
            loadMobil();
            loadPesanan();
        });

        // 1. AMBIL DATA MOBIL
        async function loadMobil() {
            const res = await fetch(`${API_URL}/mobil`);
            const data = await res.json();
            
            const tabel = document.getElementById('tabelMobil');
            const select = document.getElementById('selectMobil');
            tabel.innerHTML = '';
            select.innerHTML = '<option value="">-- Pilih Mobil --</option>';

            data.forEach(m => {
                // Isi Tabel
                tabel.innerHTML += `
                    <tr>
                        <td><b>${m.nama}</b></td>
                        <td>${m.tipe}</td>
                        <td>Rp ${m.hargaSewa.toLocaleString()}</td>
                        <td><span class="badge bg-${m.status === 'Tersedia' ? 'success' : 'danger'}">${m.status}</span></td>
                        <td>
                            <button class="btn btn-sm btn-warning" onclick="editMobil(${m.id}, '${m.nama}', '${m.tipe}', ${m.hargaSewa})">✏️</button>
                            <button class="btn btn-sm btn-danger" onclick="hapusMobil(${m.id})">🗑️</button>
                        </td>
                    </tr>
                `;
                // Isi Dropdown Pilihan di Form Transaksi (Hanya yang statusnya Tersedia)
                if(m.status === 'Tersedia') {
                    select.innerHTML += `<option value="${m.id}">${m.nama} (Rp ${m.hargaSewa}/hari)</option>`;
                }
            });
        }

        // 2. TAMBAH ATAU EDIT MOBIL (CREATE & UPDATE)
        document.getElementById('formMobil').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('mobilId').value;
            const nama = document.getElementById('namaMobil').value;
            const tipe = document.getElementById('tipeMobil').value;
            const hargaSewa = document.getElementById('hargaMobil').value;

            const bodyData = { nama, tipe, hargaSewa };

            if(id) {
                // Jika ID ada, jalankan UPDATE (PUT)
                await fetch(`${API_URL}/mobil/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });
            } else {
                // Jika ID kosong, jalankan CREATE (POST)
                await fetch(`${API_URL}/mobil`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });
            }

            document.getElementById('formMobil').reset();
            document.getElementById('mobilId').value = '';
            document.getElementById('btnSimpanMobil').innerText = 'Simpan Mobil';
            loadMobil();
        });

        function editMobil(id, nama, tipe, harga) {
            document.getElementById('mobilId').value = id;
            document.getElementById('namaMobil').value = nama;
            document.getElementById('tipeMobil').value = tipe;
            document.getElementById('hargaMobil').value = harga;
            document.getElementById('btnSimpanMobil').innerText = 'Update Data Mobil';
        }

        async function hapusMobil(id) {
            if(confirm('Hapus mobil ini? Transaksi terkait juga akan terhapus.')) {
                await fetch(`${API_URL}/mobil/${id}`, { method: 'DELETE' });
                loadMobil();
                loadPesanan();
            }
        }

        // 3. AMBIL DATA PESANAN (READ TRANS-RELASI)
        async function loadPesanan() {
            const res = await fetch(`${API_URL}/pesanan`);
            const data = await res.json();
            const tabel = document.getElementById('tabelPesanan');
            tabel.innerHTML = '';

            data.forEach(p => {
                tabel.innerHTML += `
                    <tr>
                        <td><b>${p.namaPenyewa}</b></td>
                        <td>${p.mobil ? p.mobil.nama : '<span class="text-muted">Dihapus</span>'}</td>
                        <td>${p.tanggalMulai}</td>
                        <td>${p.durasi} Hari</td>
                        <td><mark class="fw-bold">Rp ${p.totalHarga.toLocaleString()}</mark></td>
                        <td>
                            <button class="btn btn-sm btn-outline-danger" onclick="selesaiPesanan(${p.id})">Selesai / Batal</button>
                        </td>
                    </tr>
                `;
            });
        }

        // 4. BUAT TRANSAKSI BARU (CREATE PESANAN)
        document.getElementById('formPesanan').addEventListener('submit', async (e) => {
            e.preventDefault();
            const mobilId = document.getElementById('selectMobil').value;
            const namaPenyewa = document.getElementById('namaPenyewa').value;
            const tanggalMulai = document.getElementById('tanggalMulai').value;
            const durasi = document.getElementById('durasiSewa').value;

            const res = await fetch(`${API_URL}/pesanan`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mobilId, namaPenyewa, tanggalMulai, durasi })
            });

            if(res.ok) {
                document.getElementById('formPesanan').reset();
                loadMobil();
                loadPesanan();
            } else {
                const err = await res.json();
                alert(err.message);
            }
        });

        // 5. SELESAI / HAPUS TRANSAKSI (DELETE PESANAN -> MOBIL JADI TERSEDIA LAGI)
        async function selesaiPesanan(id) {
            if(confirm('Selesaikan sewa? Status mobil akan kembali "Tersedia".')) {
                await fetch(`${API_URL}/pesanan/${id}`, { method: 'DELETE' });
                loadMobil();
                loadPesanan();
            }
        }
    </script>
</body>
</html>
